<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Planner - NLP Assignment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sand: #f0f5f2;
      --warm: #c8dfd0;
      --terracotta: #2d6a4f;
      --terracotta-light: #40916c;
      --deep: #0d1b2a;
      --mid: #1b4332;
      --light-mid: #52796f;
      --accent: #023e8a;
      --accent-light: #0077b6;
      --good: #40916c;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--sand);
      color: var(--deep);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--deep);
      color: var(--sand);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 3px solid var(--terracotta);
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      letter-spacing: 0.02em;
    }

    /* ── Layout ── */
    .container {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 0;
      flex: 1;
      max-height: calc(100vh - 65px);
    }

    /* ── Chat panel ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--warm);
    }
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .message {
      max-width: 80%;
      line-height: 1.6;
    }
    .message.user {
      align-self: flex-end;
      background: var(--terracotta);
      color: white;
      padding: 12px 16px;
      border-radius: var(--radius) var(--radius) 4px var(--radius);
      font-weight: 500;
    }
    .message.assistant {
      align-self: flex-start;
      background: white;
      border: 1px solid var(--warm);
      padding: 16px 20px;
      border-radius: 4px var(--radius) var(--radius) var(--radius);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      max-width: 90%;
    }
    .message.assistant h3 {
      font-family: 'DM Serif Display', serif;
      color: var(--terracotta);
      margin: 14px 0 6px;
      font-size: 1.05rem;
    }
    .message.assistant ul { padding-left: 20px; margin: 6px 0; }
    .message.assistant li { margin-bottom: 4px; }
    .message.assistant strong { color: var(--mid); }
    .message.assistant em { color: var(--accent); }

    /* ── Input ── */
    .input-row {
      padding: 16px 20px;
      border-top: 1px solid var(--warm);
      background: white;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      border: 1.5px solid var(--warm);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      min-height: 44px;
      max-height: 120px;
    }
    #user-input:focus { border-color: var(--terracotta); }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.85rem;
    }
    #send-btn {
      background: var(--terracotta);
      color: white;
    }
    #send-btn:hover { background: var(--terracotta-light); }
    #send-btn:disabled { background: var(--light-mid); cursor: not-allowed; }
    #reset-btn {
      background: transparent;
      color: var(--light-mid);
      border: 1px solid var(--warm);
      padding: 10px 14px;
    }
    #reset-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--deep);
      color: var(--sand);
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .sidebar h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      color: var(--warm);
      border-bottom: 1px solid #1a3a2a;
      padding-bottom: 8px;
    }

    /* Quick prompts */
    .quick-prompts { display: flex; flex-direction: column; gap: 6px; }
    .quick-btn {
      background: #0f2d1f;
      border: 1px solid #1a3a2a;
      color: var(--warm);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      line-height: 1.4;
    }
    .quick-btn:hover { border-color: var(--terracotta); color: var(--sand); }

    /* Eval panel */
    .eval-panel { display: flex; flex-direction: column; gap: 10px; }
    .eval-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
    }
    .eval-label { color: var(--light-mid); text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.7rem; }
    .eval-score {
      font-weight: 600;
      font-size: 0.85rem;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .score-1, .score-2 { background: #5a2020; color: #ff9090; }
    .score-3 { background: #3a3a10; color: #d4d460; }
    .score-4, .score-5 { background: #1a4a2a; color: #60d480; }
    .score-bar {
      width: 100%;
      height: 4px;
      background: #0f2d1f;
      border-radius: 2px;
      margin-top: 3px;
    }
    .score-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--terracotta);
      transition: width 0.5s ease;
    }
    .eval-feedback {
      font-size: 0.75rem;
      color: #7aab92;
      line-height: 1.5;
      font-style: italic;
      padding-top: 4px;
      border-top: 1px solid #1a3a2a;
    }
    .eval-placeholder {
      color: #3a6a4a;
      font-size: 0.78rem;
      text-align: center;
      padding: 12px 0;
    }

    /* Heuristics */
    .heuristic-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 20px;
      margin: 2px;
    }
    .tag-good { background: #0f2d1f; color: #60d490; }
    .tag-warn { background: #0a2040; color: #60aadd; }
    .tag-bad  { background: #0d1b2a; color: #7ab0d4; }

    /* Typing indicator */
    .typing {
      align-self: flex-start;
      background: white;
      border: 1px solid var(--warm);
      padding: 14px 18px;
      border-radius: 4px var(--radius) var(--radius) var(--radius);
      display: flex;
      gap: 6px;
    }
    .typing span {
      width: 8px; height: 8px;
      background: var(--terracotta);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Personalised Travel Planner</h1>
    </div>
  </header>

  <div class="container">
    <!-- Chat -->
    <div class="chat-panel">
      <div id="chat-box">
        <div class="message assistant">
          <strong>Hello, traveller!</strong><br><br>
          Tell me where you're headed and what you're into - I'll build you a personalised itinerary.<br><br>
          Try: <em>"I'm going to Istanbul for 3 days. I love history and cheap street food."</em>
        </div>
      </div>
      <div class="input-row">
        <textarea id="user-input" rows="1" placeholder="Where are you going? What do you love?"></textarea>
        <button class="btn" id="reset-btn" title="Start new conversation">↺</button>
        <button class="btn" id="send-btn">Send →</button>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div>
        <h2>Try These</h2>
        <div class="quick-prompts">
          <button class="quick-btn" data-prompt="I'm going to Istanbul for 3 days. I love history and cheap street food.">3 days Istanbul · history + cheap food</button>
          <button class="quick-btn" data-prompt="2 days in Tokyo focused on food - local spots, not tourist traps. Mid-range budget.">2 days Tokyo · local food focus</button>
          <button class="quick-btn" data-prompt="4 days Rome. Art, history, but make it less crowded - off the beaten path.">4 days Rome · off-the-beaten-path</button>
          <button class="quick-btn" data-prompt="Family trip to Paris, 3 days, two kids ages 6 and 10. What do we do?">Paris with kids · 3 days</button>
          <button class="quick-btn" data-prompt="Can you make yesterday's plan less crowded and more local?">Refine: less crowded, more local</button>
        </div>
      </div>

      <div>
        <h2>Last Response Eval</h2>
        <div class="eval-panel" id="eval-panel">
          <div class="eval-placeholder">Send a message to see evaluation scores</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const resetBtn = document.getElementById('reset-btn');
    const evalPanel = document.getElementById('eval-panel');

    function md(text) {
      // Minimal markdown: bold, italic, headers, bullets
      return text
        .replace(/### (.*)/g, '<h3>$1</h3>')
        .replace(/## (.*)/g, '<h3>$1</h3>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/^- (.*)/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/\n{2,}/g, '<br><br>')
        .replace(/\n/g, '<br>');
    }

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = role === 'assistant' ? md(content) : content;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing-indicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    function scoreClass(s) {
      if (s <= 2) return 'score-1';
      if (s === 3) return 'score-3';
      return 'score-5';
    }

    function renderEval(ev) {
      if (!ev || !ev.scores) { evalPanel.innerHTML = '<div class="eval-placeholder">No itinerary in this turn.</div>'; return; }
      const dims = [
        ['feasibility', 'Feasibility'],
        ['specificity', 'Specificity'],
        ['personalisation', 'Personalisation'],
        ['cultural_depth', 'Cultural Depth'],
        ['variety', 'Variety'],
      ];
      let html = '';
      for (const [key, label] of dims) {
        const s = ev.scores[key] || 3;
        html += `<div>
          <div class="eval-row">
            <span class="eval-label">${label}</span>
            <span class="eval-score ${scoreClass(s)}">${s}/5</span>
          </div>
          <div class="score-bar"><div class="score-fill" style="width:${s*20}%"></div></div>
        </div>`;
      }
      // Heuristics
      if (ev.heuristics) {
        const h = ev.heuristics;
        html += '<div style="margin-top:8px;"><div class="eval-label" style="margin-bottom:4px;">Heuristic Checks</div>';
        html += renderTag(h.has_day_structure, 'Day structure');
        html += renderTag(h.has_local_tips, 'Local tips');
        html += renderTag(h.mentions_budget, 'Budget info');
        const rep = h.repetition_ratio || 0;
        html += renderTag(rep < 0.3, `Repetition: ${(rep*100).toFixed(0)}%`);
        html += '</div>';
      }
      if (ev.overall_feedback) {
        html += `<div class="eval-feedback">${ev.overall_feedback}</div>`;
      }
      evalPanel.innerHTML = html;
    }

    function renderTag(good, label) {
      const cls = good ? 'tag-good' : 'tag-warn';
      const icon = good ? '✓' : '⚠';
      return `<span class="heuristic-tag ${cls}">${icon} ${label}</span>`;
    }

    async function send() {
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      addMessage('user', msg);
      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg }),
        });
        const data = await res.json();
        removeTyping();
        if (data.error) {
          addMessage('assistant', `Error: ${data.error}`);
        } else {
          addMessage('assistant', data.reply);
          renderEval(data.evaluation);
        }
      } catch (e) {
        removeTyping();
        addMessage('assistant', 'Connection error. Please try again.');
      }
      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    resetBtn.addEventListener('click', async () => {
      await fetch('/reset', { method: 'POST' });
      chatBox.innerHTML = '<div class="message assistant"><strong>Conversation reset.</strong><br><br>Where would you like to travel next?</div>';
      evalPanel.innerHTML = '<div class="eval-placeholder">Send a message to see evaluation scores</div>';
    });

    document.querySelectorAll('.quick-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        input.value = btn.dataset.prompt;
        input.dispatchEvent(new Event('input'));
        input.focus();
      });
    });
  </script>
</body>
</html>
